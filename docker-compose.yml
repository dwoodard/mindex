services:
  reverb:
    build:
      context: .
      dockerfile: docker/reverb/Dockerfile
    container_name: mindex_reverb
    working_dir: /app
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      REVERB_HOST: "0.0.0.0"
      REVERB_PORT: 8080
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: mindex_neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/neo4jtest
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/plugins:/plugins
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
